<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title description">
  <title id="title">OpenGameMate social preview</title>
  <desc id="description">OpenGameMate icon beside the project name and the tagline Let ChatGPT Voice watch your gameplay and chat like a gaming buddy.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F9F7F0"/>
      <stop offset="1" stop-color="#EEF4F3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#284F7A"/>
      <stop offset="1" stop-color="#6B9B91"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#18324B" flood-opacity="0.16"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="92" y="112" width="416" height="416" rx="92"/>
    </clipPath>
  </defs>

  <rect width="1280" height="640" fill="url(#background)"/>
  <circle cx="1210" cy="42" r="170" fill="#BFD8D1" opacity="0.32"/>
  <circle cx="1180" cy="620" r="230" fill="#CBD8EA" opacity="0.28"/>
  <path d="M0 578 C270 532 430 624 710 584 C930 552 1070 508 1280 540 V640 H0 Z" fill="#FFFFFF" opacity="0.48"/>

  <rect x="76" y="96" width="448" height="448" rx="108" fill="#FFFFFF" opacity="0.86" filter="url(#shadow)"/>
  <image x="92" y="112" width="416" height="416" href="OpenGameMate.AppIcon.png" xlink:href="OpenGameMate.AppIcon.png" preserveAspectRatio="xMidYMid slice" clip-path="url(#iconClip)"/>

  <rect x="584" y="152" width="96" height="8" rx="4" fill="url(#accent)"/>
  <text x="584" y="232" fill="#17324D" font-family="Segoe UI, Arial, sans-serif" font-size="66" font-weight="700" letter-spacing="-1.5">OpenGameMate</text>
  <text x="584" y="312" fill="#294A63" font-family="Segoe UI, Arial, sans-serif" font-size="31" font-weight="500">Let ChatGPT Voice watch your gameplay</text>
  <text x="584" y="357" fill="#294A63" font-family="Segoe UI, Arial, sans-serif" font-size="31" font-weight="500">and chat like a gaming buddy.</text>
  <rect x="584" y="414" width="302" height="54" rx="27" fill="#17324D"/>
  <text x="735" y="449" text-anchor="middle" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="600" letter-spacing="0.4">Windows · Open Source</text>
</svg>
